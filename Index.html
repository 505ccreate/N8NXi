<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N8NXi | The Vault</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            background-color: #09090b;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #1e1e21; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #E50914; }
        .netflix-shadow { box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .red-glow { filter: drop-shadow(0 0 15px rgba(229, 9, 20, 0.4)); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICONS (Lucide Fallbacks) ---
        const Icon = ({ name, size = 20, className = "" }) => (
            <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize: size }}></i>
        );

        const N8N_RED = "#E50914";

        const CATEGORIES = [
            { id: 'ai', name: 'AI Agents & LLMs', icon: 'robot' },
            { id: 'dev', name: 'Developer Workflows', icon: 'code' },
            { id: 'biz', name: 'Business Process', icon: 'briefcase' },
            { id: 'cloud', name: 'Cloud & Infrastructure', icon: 'cloud' },
            { id: 'mkt', name: 'Marketing & Sales', icon: 'chart-line' },
            { id: 'security', name: 'Security & Ops', icon: 'shield-halved' },
        ];

        const generateVault = () => {
            const templates = [
                { name: "Auto-GPT Core", desc: "Autonomous task agent for n8n.", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995" },
                { name: "SaaS Monitor", desc: "Billing and uptime automation.", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f" },
                { name: "Social Scraper", desc: "Lead gen from LinkedIn & X.", img: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7" },
                { name: "DB Master-Sync", desc: "Cross-cloud database syncing.", img: "https://images.unsplash.com/photo-1558494949-ef010cbdcc48" },
                { name: "DevOps Pipeline", desc: "CI/CD automation logic.", img: "https://images.unsplash.com/photo-1618401471353-b98afee0b2eb" },
            ];
            const vault = [];
            let id = 1;
            CATEGORIES.forEach(cat => {
                for (let i = 0; i < 20; i++) {
                    const t = templates[Math.floor(Math.random() * templates.length)];
                    vault.push({
                        id: id++,
                        name: `${t.name} v${i + 1}`,
                        cat: cat.id,
                        nodes: Math.floor(Math.random() * 30) + 5,
                        complexity: i % 3 === 0 ? 'Expert' : 'Pro',
                        description: t.desc,
                        match: 90 + Math.floor(Math.random() * 10),
                        image: `${t.img}?auto=format&fit=crop&q=80&w=600&sig=${id}`
                    });
                }
            });
            return vault;
        };

        const VAULT_DATA = generateVault();

        const App = () => {
            const [search, setSearch] = useState('');
            const [selected, setSelected] = useState(null);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const filtered = useMemo(() => 
                VAULT_DATA.filter(w => w.name.toLowerCase().includes(search.toLowerCase()))
            , [search]);

            const featured = VAULT_DATA[0];

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-500 px-6 md:px-16 flex items-center justify-between ${scrolled ? 'bg-zinc-950/95 py-4 border-b border-white/5 shadow-2xl' : 'bg-gradient-to-b from-black/90 to-transparent py-8'}`}>
                        <div className="flex items-center space-x-4 md:space-x-12">
                            <div className="flex items-center space-x-2 group cursor-pointer">
                                <div className="w-10 h-10 md:w-12 md:h-12 bg-[#E50914] rounded-lg flex items-center justify-center font-black italic shadow-lg text-white">Xi</div>
                                <span className="text-white font-black text-2xl md:text-4xl tracking-tighter uppercase italic group-hover:text-[#E50914] transition-colors">N8NXi</span>
                            </div>
                        </div>
                        <div className="flex items-center space-x-6">
                            <div className="relative group hidden sm:block">
                                <input 
                                    type="text" 
                                    placeholder="Search 2,492 automations..." 
                                    className="bg-zinc-900/50 border border-white/10 rounded-full pl-10 pr-6 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-[#E50914] w-64 transition-all text-white font-bold"
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"><Icon name="magnifying-glass" size={14} /></div>
                            </div>
                            <button className="bg-zinc-900 border border-white/10 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:border-[#E50914] transition-all">Sign In</button>
                        </div>
                    </nav>

                    {/* Content Logic */}
                    {!search ? (
                        <>
                            {/* Hero */}
                            <div className="relative h-[85vh] md:h-screen w-full flex flex-col justify-center overflow-hidden">
                                <div className="absolute inset-0">
                                    <img src={featured.image} className="w-full h-full object-cover brightness-[0.2] scale-105" alt="featured" />
                                    <div className="absolute inset-0 bg-gradient-to-r from-zinc-950 via-zinc-950/40 to-transparent" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-zinc-950 via-transparent to-transparent" />
                                </div>
                                <div className="relative z-10 px-6 md:px-16 max-w-5xl space-y-8">
                                    <div className="flex items-center space-x-3">
                                        <span className="bg-[#E50914] text-white px-3 py-1 rounded-sm text-[10px] font-black uppercase tracking-[0.3em] italic shadow-lg shadow-[#E50914]/40">Global Access</span>
                                        <span className="text-zinc-500 font-black italic uppercase text-[10px] tracking-widest">#1 Directory of 2026</span>
                                    </div>
                                    <h1 className="text-6xl md:text-[12rem] font-black text-white tracking-tighter leading-[0.8] uppercase italic drop-shadow-2xl">
                                        N8N<span className="text-[#E50914]">Xi</span> STUDIO
                                    </h1>
                                    <p className="text-xl md:text-4xl text-zinc-400 font-black italic leading-tight tracking-tighter max-w-3xl">
                                        "Stop building. <span className="text-white underline decoration-[#E50914] underline-offset-8">Start Automating.</span>"
                                    </p>
                                    <div className="flex flex-col sm:flex-row gap-4 pt-6">
                                        <button className="bg-white text-black px-12 py-5 rounded-2xl font-black uppercase italic tracking-tighter text-3xl shadow-2xl hover:bg-[#E50914] hover:text-white transition-all active:scale-95 flex items-center justify-center space-x-4">
                                            <Icon name="play" size={24} /> <span>Enter Vault</span>
                                        </button>
                                        <button className="bg-zinc-800/40 text-white px-10 py-5 rounded-2xl font-black uppercase italic tracking-tighter text-2xl backdrop-blur-3xl border border-white/5 hover:bg-white/10 transition-all flex items-center justify-center space-x-4">
                                            <Icon name="bolt" size={24} className="text-green-500" /> <span>Live Pulse</span>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Stats */}
                            <div className="bg-zinc-950 py-12 px-6 md:px-16 border-y border-white/5 flex flex-col md:flex-row justify-around items-center gap-10">
                                <div className="text-center md:text-left">
                                    <p className="text-zinc-600 font-black uppercase tracking-[0.3em] text-[10px] mb-1">Total Vaults</p>
                                    <p className="text-2xl font-black italic tracking-tighter">2,492+ <span className="text-[#E50914]">Workflows</span></p>
                                </div>
                                <div className="text-center md:text-left">
                                    <p className="text-zinc-600 font-black uppercase tracking-[0.3em] text-[10px] mb-1">Active Nodes</p>
                                    <p className="text-2xl font-black italic tracking-tighter">52,108+ <span className="text-[#E50914]">Sequences</span></p>
                                </div>
                                <div className="text-center md:text-left">
                                    <p className="text-zinc-600 font-black uppercase tracking-[0.3em] text-[10px] mb-1">Status</p>
                                    <p className="text-2xl font-black italic tracking-tighter text-green-500">LIVE SYNC ACTIVE</p>
                                </div>
                            </div>

                            {/* Rows */}
                            <div className="pb-32 pt-16 space-y-24 bg-zinc-950">
                                {CATEGORIES.map(cat => (
                                    <div key={cat.id} className="px-6 md:px-16">
                                        <div className="flex items-center space-x-4 mb-8">
                                            <div className="w-1.5 h-8 bg-[#E50914] rounded-full"></div>
                                            <h2 className="text-2xl md:text-4xl font-black italic uppercase tracking-tighter">{cat.name}</h2>
                                        </div>
                                        <div className="flex space-x-6 overflow-x-auto scrollbar-hide pb-10">
                                            {VAULT_DATA.filter(w => w.cat === cat.id).map(w => (
                                                <div 
                                                    key={w.id} 
                                                    onClick={() => setSelected(w)}
                                                    className="min-w-[280px] md:min-w-[400px] aspect-video bg-zinc-900 rounded-2xl overflow-hidden relative cursor-pointer border border-white/5 transition-all hover:scale-105 hover:border-[#E50914] hover:z-10 group"
                                                >
                                                    <img src={w.image} className="w-full h-full object-cover brightness-[0.5] group-hover:brightness-[0.2] transition-all" />
                                                    <div className="absolute inset-0 p-6 flex flex-col justify-end">
                                                        <p className="text-white text-lg font-black uppercase italic tracking-tighter mb-1 truncate">{w.name}</p>
                                                        <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest opacity-100 group-hover:opacity-0 transition-opacity">{w.complexity} • {w.nodes} Nodes</p>
                                                        <div className="absolute inset-0 p-8 flex flex-col justify-center opacity-0 group-hover:opacity-100 transition-all transform translate-y-4 group-hover:translate-y-0">
                                                            <div className="flex items-center space-x-4">
                                                                <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center text-black shadow-2xl"><Icon name="play" size={16} className="ml-0.5" /></div>
                                                                <div>
                                                                    <p className="text-green-500 text-[10px] font-black uppercase tracking-widest">{w.match}% Recommended</p>
                                                                    <p className="text-white text-[10px] font-bold uppercase tracking-widest">N8NXi Verified</p>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    ) : (
                        <div className="pt-48 px-6 md:px-16 min-h-screen pb-40">
                            <h2 className="text-6xl md:text-9xl font-black italic uppercase tracking-tighter mb-4">THE VAULT</h2>
                            <p className="text-[#E50914] text-xl md:text-3xl font-black italic uppercase tracking-tighter mb-20">Results for: "{search}"</p>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-12">
                                {filtered.map(w => (
                                    <div key={w.id} className="space-y-4 cursor-pointer" onClick={() => setSelected(w)}>
                                        <div className="aspect-video rounded-xl overflow-hidden border border-white/10 hover:border-[#E50914] transition-all">
                                            <img src={w.image} className="w-full h-full object-cover brightness-50" />
                                        </div>
                                        <div>
                                            <h3 className="text-2xl font-black italic uppercase tracking-tighter">{w.name}</h3>
                                            <p className="text-[#E50914] text-[10px] font-bold uppercase tracking-widest">{w.complexity} • {w.nodes} Nodes</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Modal */}
                    {selected && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/98 backdrop-blur-xl transition-all">
                            <div className="relative w-full max-w-6xl bg-zinc-950 rounded-[2.5rem] overflow-hidden border border-white/5 flex flex-col md:flex-row shadow-2xl">
                                <button onClick={() => setSelected(null)} className="absolute top-8 right-8 z-20 bg-black/50 p-3 rounded-full text-white hover:bg-[#E50914] transition-all"><Icon name="xmark" size={24} /></button>
                                <div className="md:w-3/5 h-[300px] md:h-auto relative">
                                    <img src={selected.image} className="w-full h-full object-cover brightness-50" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-zinc-950 via-transparent to-transparent" />
                                </div>
                                <div className="md:w-2/5 p-12 flex flex-col justify-center space-y-8">
                                    <h2 className="text-5xl md:text-7xl font-black italic uppercase tracking-tighter leading-none">{selected.name}</h2>
                                    <p className="text-zinc-400 text-xl md:text-2xl italic font-bold border-l-2 border-[#E50914] pl-6">"{selected.description}"</p>
                                    <div className="space-y-4">
                                        <button className="w-full bg-white text-black py-5 rounded-2xl font-black uppercase italic tracking-tighter text-3xl hover:bg-[#E50914] hover:text-white transition-all shadow-xl flex items-center justify-center space-x-4">
                                            <Icon name="download" size={24} /> <span>Get Template</span>
                                        </button>
                                        <p className="text-center text-[10px] font-black uppercase tracking-[0.3em] text-zinc-600 italic">Zie619 Reference Archive</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="bg-zinc-950 border-t border-white/5 py-40 px-6 md:px-16 text-zinc-600">
                        <div className="flex items-center space-x-3 mb-12">
                            <div className="w-12 h-12 bg-zinc-900 border border-white/10 rounded-xl flex items-center justify-center font-black italic text-[#E50914] text-2xl shadow-xl">Xi</div>
                            <span className="text-zinc-200 font-black text-4xl tracking-tighter italic uppercase">N8NXi.com</span>
                        </div>
                        <p className="text-xl md:text-2xl font-bold italic max-w-2xl mb-20 opacity-40">"The world's largest sequence library. Built for the builders of tomorrow. Powered by SorenXi."</p>
                        <div className="flex justify-between items-center opacity-30 border-t border-white/5 pt-12 grayscale">
                            <p className="text-[11px] font-black uppercase tracking-[0.5em] italic">© 2026 N8NXi Archive</p>
                            <p className="text-[11px] font-black uppercase tracking-[0.5em] italic">Powered by SorenXi Engine</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
